---
- name: Add /etc/hosts entries to hosts
  hosts: all
  become: true
  tasks:
    - name: Fetch setup
      ansible.builtin.setup:

    - name: Add IP address of all hosts from inventory to all hosts
      ansible.builtin.lineinfile:
        dest: /etc/hosts
        regexp: '.*{{ item }}$'
        line: "{{ hostvars[item].ansible_default_ipv4.address }} {{ hostvars[item].ansible_fqdn }}"
        state: present
      when:
        - hostvars[item].ansible_fqdn is defined
        - hostvars[item].ansible_default_ipv4.address is defined
      with_items: "{{ groups['all'] }}"

- name: k3s-init # noqa name[casing]
  hosts: k3s-cluster-init
  become: true
  vars:
    k3s_argocd: true
    k3s_argocd_ingress_hostname: argocd.example.com
    k3s_argocd_gitops_enable: true
    k3s_argocd_gitops_url: https://github.com/tbauriedel/k3s-cluster-gitops
    k3s_argocd_gitops_path: gitops/cluster-bootstrap
    k3s_argocd_gitops_target: main
  roles:
    - tbauriedel.k3s

- name: k3s-joiner # noqa name[casing]
  hosts: k3s-cluster-joiner
  become: true
  vars:
    k3s_config_cluster_init: false
    k3s_config_init_server: k3s-test01
  roles:
    - tbauriedel.k3s

- name: Copy kubeconfig
  hosts: k3s-cluster-init:k3s-cluster-joiner
  become: true
  tasks:
    - name: Create ~/.kube folder for become_user
      ansible.builtin.file:
        state: directory
        path: ~/.kube
        group: root
        mode: "0644"

    - name: Copy kubeconfig to become_user
      ansible.builtin.copy:
        remote_src: true
        src: /etc/rancher/k3s/k3s.yaml
        dest: ~/.kube/config
        owner: root
        group: root
        mode: "0644"
