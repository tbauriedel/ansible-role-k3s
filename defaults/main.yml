---
k3s_skip_installation: false
# target release
k3s_release: 1.33.12
# install source (for non air-gapped)
k3s_binary_source: "https://github.com/k3s-io/k3s/releases/download/v{{ k3s_release }}%2Bk3s1/k3s"
# k3s binary location on target host
k3s_binary_path: /usr/local/bin/k3s

k3s_version_kubectl: 1.36.0
k3s_binary_source_kubectl: "https://dl.k8s.io/release/v{{ k3s_version_kubectl }}/bin/linux/amd64/kubectl"
k3s_binary_path_kubectl: /usr/local/bin/kubectl
k3s_enable_kubectl_auto_completion: true

# type of node
k3s_node_type: server
# init cluster
k3s_config_cluster_init: true
# domain for the cluster
k3s_config_cluster_domain: cluster.local
# CIDR for pods
k3s_config_cluster_cidr: 10.42.0.0/16
# CIDR for services
k3s_config_service_cidr: 10.43.0.0/16
# ipv4 coredns
k3s_config_cluster_dns: 10.43.0.10
# range for node-ports
k3s_config_nodeport_range: 30000-32767
# server to connect to join a cluster
k3s_config_init_server: "localhost"
# local storage class
k3s_config_disable_local_storage: false

# place kube-vip on cluster
k3s_kube_vip: false
# ipv4 for the cluster ip
k3s_kube_vip_ipv4: ""
# interface to apply to
k3s_kube_vip_interface: ""
