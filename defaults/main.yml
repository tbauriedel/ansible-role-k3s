---
k3s_skip_installation: false
# target release
k3s_release: 1.33.12
# install source (for non air-gapped)
k3s_binary_source: "https://github.com/k3s-io/k3s/releases/download/v{{ k3s_release }}%2Bk3s1/k3s"
# k3s binary location on target host
k3s_binary_path: /usr/local/bin/k3s

k3s_version_kubectl: 1.36.0
k3s_binary_source_kubectl: "https://dl.k8s.io/release/v{{ k3s_version_kubectl }}/bin/linux/amd64/kubectl"
k3s_binary_path_kubectl: /usr/local/bin/kubectl
k3s_enable_kubectl_auto_completion: true

# type of node
k3s_node_type: server
# init cluster
k3s_config_cluster_init: true
# domain for the cluster
k3s_config_cluster_domain: cluster.local
# CIDR for pods
k3s_config_cluster_cidr: 10.42.0.0/16
# CIDR for services
k3s_config_service_cidr: 10.43.0.0/16
# ipv4 coredns
k3s_config_cluster_dns: 10.43.0.10
# range for node-ports
k3s_config_nodeport_range: 30000-32767
# server to connect to join a cluster
k3s_config_init_server: "localhost"
# local storage class
k3s_config_disable_local_storage: false

# enable tls for traefik. will patch the ingress to use this TLS certificate by default
k3s_traefik_tls: false
# base64 encoded key
k3s_traefik_tls_key: ""
# base64 encoded certificate (with chain)
k3s_traefik_tls_crt: ""

# place kube-vip on cluster
k3s_kube_vip: false
# ipv4 for the cluster ip
k3s_kube_vip_ipv4: ""
# interface to apply to
k3s_kube_vip_interface: ""

# Enable nfs storage driver
k3s_storage_nfs: false
# helm chart version to use
k3s_storage_nfs_chart_version: 4.13.3
# create storageclass
k3s_storage_nfs_create_storageclass: true
# Name for the storage class that will be created
k3s_storage_nfs_storageclass_name: csi-nfs
# nfs server
k3s_storage_nfs_server: ""
# share to use on the nfs server
k3s_storage_nfs_server_share: ""
# Reclaim policy for the storage class
k3s_storage_nfs_reclaim_policy: Delete
# Volume binding for storage class
k3s_storage_nfs_volume_binding_mode: Immediate
# nfs version
k3s_storage_nfs_version: 4.1

# Enable argocd in cluster
k3s_argocd: false
k3s_argocd_chart_version: 9.7.0
k3s_argocd_ingress_hostname: ""
